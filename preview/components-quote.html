<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Card — Citação editorial</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-100); }
  .card { width: 700px; padding: 32px 48px; box-sizing: border-box; display: flex; gap: 28px; align-items: stretch; }
  .rule { width: 3px; background: var(--laranja-500); border-radius: 2px; flex-shrink: 0; }
  .quote { font-family: var(--font-display); font-weight: 300; font-style: italic; font-size: 26px; line-height: 1.3; color: var(--ink-900); text-wrap: balance; max-width: 50ch; margin: 0 0 12px; }
  .by { font-family: var(--font-body); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-500); }
  .by strong { color: var(--ink-900); font-weight: 500; letter-spacing: 0.04em; text-transform: none; font-size: 13px; }
</style>
</head>
<body>
  <div class="card">
    <div class="rule"></div>
    <div>
      <p class="quote">Sem relações, não existem os sonhos.</p>
      <div class="by"><strong>Elaine Narcizo</strong> · Ponte, Exercício 3</div>
    </div>
  </div>
</body>
</html>
