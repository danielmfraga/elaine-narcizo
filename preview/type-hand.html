<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Card — Citação manuscrita</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-100); }
  .card { width: 700px; padding: 36px 48px; box-sizing: border-box; display: flex; align-items: center; gap: 36px; }
  .quote { font-family: var(--font-hand); font-weight: 500; font-size: 72px; line-height: 0.95; color: var(--laranja-700); transform: rotate(-3deg); max-width: 460px; }
  .quote .small { display: block; font-size: 32px; transform: rotate(2deg); margin-top: 6px; color: var(--laranja-500); }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--ink-500); line-height: 1.4; }
  .meta strong { display: block; color: var(--ink-900); font-weight: 500; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="card">
    <div class="quote">com&nbsp;carinho,<span class="small">— Elaine</span></div>
    <div class="meta"><strong>Caveat · acento manuscrito</strong>Uso parcimonioso: assinatura, dedicatória, marginália. Sempre em rotação leve (-3° a -6°) e em cor de acento.</div>
  </div>
</body>
</html>
