<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Card — Sugestão</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-100); }
  .card { width: 700px; padding: 28px 40px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .sug {
    background: var(--cream-50);
    border: 1px solid var(--line);
    border-radius: var(--radius-3);
    padding: 18px 20px 20px;
    transition: transform var(--dur-2) var(--ease-out), box-shadow var(--dur-2) var(--ease-out);
    cursor: pointer;
  }
  .sug:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
  .sug .eyebrow { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--laranja-700); margin-bottom: 6px; }
  .sug .body { font-family: var(--font-display); font-style: italic; font-weight: 300; font-size: 17px; line-height: 1.4; color: var(--ink-900); margin: 0; }
  .sug .pick { font-family: var(--font-hand); font-size: 22px; color: var(--laranja-700); margin-top: 10px; display: inline-block; transform: rotate(-2deg); }
</style>
</head>
<body>
  <div class="card">
    <div class="sug">
      <div class="eyebrow">sugestão</div>
      <p class="body">Plantar uma árvore por ano, com o nome de alguém que você ama.</p>
      <span class="pick">adotar →</span>
    </div>
    <div class="sug">
      <div class="eyebrow">sugestão</div>
      <p class="body">Escrever cartas para contar sobre seu projeto de vida.</p>
      <span class="pick">adotar →</span>
    </div>
  </div>
</body>
</html>
