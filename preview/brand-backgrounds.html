<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Card — Fundos texturizados</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-50); }
  .card { width: 700px; padding: 18px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .tile { position: relative; aspect-ratio: 16/10; border-radius: var(--radius-2); overflow: hidden; box-shadow: var(--shadow-1); }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tile .lab { position: absolute; left: 10px; bottom: 10px; font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--ink-900); background: rgba(245,235,222,0.9); padding: 4px 8px; border-radius: var(--radius-pill); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="card">
    <div class="tile"><img src="../assets/bg-green.jpg" alt="" /><span class="lab">Presente</span></div>
    <div class="tile"><img src="../assets/bg-purple.jpg" alt="" /><span class="lab">Futuro</span></div>
    <div class="tile"><img src="../assets/bg-orange.jpg" alt="" /><span class="lab">Ponte</span></div>
  </div>
</body>
</html>
