<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Logo / wordmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=DM+Sans:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-100); }
  .card {
    width: 700px; height: 150px;
    display: grid; place-items: center;
    background: var(--cream-100);
    font-family: var(--font-body);
    color: var(--ink-900);
  }
  .lock {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .script {
    font-family: "Caveat Brush", "Caveat", cursive;
    font-weight: 400;
    font-size: 84px;
    line-height: 0.85;
    letter-spacing: -0.005em;
    color: var(--laranja-700);
    transform: rotate(-2deg);
  }
  .rule { width: 52px; height: 1px; background: var(--ink-900); opacity: 0.4; margin: 8px 0 2px; }
  .tag {
    font-family: var(--font-body);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-500);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="lock">
      <span class="script">PONTE</span>
      <span class="rule"></span>
      <span class="tag">projetos&nbsp;de&nbsp;vida</span>
    </div>
  </div>
</body>
</html>
