<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Card — Indicador de etapa</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-100); }
  .card { width: 700px; padding: 36px 40px; box-sizing: border-box; }

  .ponte { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: end; gap: 0; position: relative; }
  .ponte::before {
    content: ""; position: absolute; left: 14%; right: 14%; top: 32px; height: 1px;
    background: var(--line-strong);
  }
  .stage { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
  .dot { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center; background: var(--cream-50); border: 1px solid var(--line-strong); font-family: var(--font-display); font-size: 22px; color: var(--ink-700); }
  .stage[data-state="done"] .dot { background: var(--verde-500); color: var(--cream-50); border-color: var(--verde-700); }
  .stage[data-state="active"] .dot { background: var(--laranja-500); color: var(--cream-50); border-color: var(--laranja-700); box-shadow: 0 0 0 6px rgba(232,122,50,0.18); }
  .name { font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--ink-900); margin-top: 14px; }
  .sub  { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-500); margin-top: 2px; }
</style>
</head>
<body>
  <div class="card">
    <div class="ponte">
      <div class="stage" data-state="done"><div class="dot">1</div><div class="name">presente</div><div class="sub">concluído</div></div>
      <div class="stage" data-state="active"><div class="dot">2</div><div class="name">futuro</div><div class="sub">agora</div></div>
      <div class="stage" data-state="todo"><div class="dot">3</div><div class="name">ponte</div><div class="sub">em breve</div></div>
    </div>
  </div>
</body>
</html>
