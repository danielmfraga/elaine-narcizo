<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Card — Display</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream-100); }
  .card { width: 700px; padding: 40px 48px 32px; box-sizing: border-box; }
  .specimen { font-family: var(--font-display); font-weight: 300; font-size: 92px; line-height: 0.95; letter-spacing: -0.03em; color: var(--ink-900); margin: 0; }
  .specimen em { font-style: italic; color: var(--laranja-700); }
  .meta { display: flex; gap: 24px; margin-top: 18px; font-size: 12px; color: var(--ink-500); font-family: ui-monospace, monospace; }
  .meta span strong { color: var(--ink-900); font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <p class="specimen">o futuro é <em>ancestral</em></p>
    <div class="meta">
      <span><strong>Newsreader</strong> · 300</span>
      <span>92px · -0.03em</span>
      <span>opsz: 72</span>
    </div>
  </div>
</body>
</html>
