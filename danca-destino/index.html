<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DançaDestino — um ritual para nosso tempo</title>
<meta name="description" content="DançaDestino — um ritual para nosso tempo. Toda sexta, 20h." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --roxo:#6C28D6; --roxo-fundo:#5A1FB8; --roxo-escuro:#3D1185;
    --amarelo:#F5D933; --branco:#FDFBFF;
    --disp:"Space Grotesk",sans-serif; --mono:"Space Mono",ui-monospace,monospace;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:var(--roxo-fundo); color:var(--branco); font-family:var(--mono);
    -webkit-font-smoothing:antialiased; }
  img{ display:block; max-width:100%; }
  .wrap{ max-width:540px; margin:0 auto; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.55; } 50%{ transform:translateY(7px); opacity:1; } }

  /* ── CAPA (nativa, com os elementos do Daniel) ── */
  .capa{ position:relative; min-height:100svh; min-height:100vh; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; text-align:center; padding:30px 24px 28px;
    background:radial-gradient(125% 80% at 50% 16%, var(--roxo) 0%, var(--roxo-fundo) 58%, var(--roxo-escuro) 100%); }
  .hashtag-svg{ width:min(56%,210px); margin-top:2px; }            /* SVG branco do Daniel */
  .wordmark-svg{ width:min(94%,470px); margin:16px 0 6px; }        /* SVG amarelo do Daniel (hero) */
  .capa-art{ position:relative; width:min(70%,260px); margin:auto 0; }
  .capa-art .ybox{ position:absolute; left:4%; bottom:8%; width:74%; height:54%;
    background:var(--amarelo); transform:rotate(-3.5deg); }
  .capa-art .collage{ position:relative; width:100%; filter:drop-shadow(0 16px 26px rgba(0,0,0,.32)); }
  .capa-art .candle{ position:absolute; right:-13%; bottom:-7%; width:34%; z-index:2;
    filter:drop-shadow(0 10px 16px rgba(0,0,0,.3)); }
  .capa-art .seal{ position:absolute; left:-15px; top:-10px; width:86px; z-index:3; }
  .capa-art .seal img{ width:100%; animation:spin 22s linear infinite; }
  .tag{ font-family:var(--disp); font-weight:500; font-size:1.18rem; margin-top:16px; }
  .when{ font-size:.92rem; color:var(--amarelo); margin-top:4px; }
  .cue{ position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-size:24px; line-height:1;
    animation:bob 1.6s ease-in-out infinite; }

  /* ── CARTAZES (placeholder) — viram nativos a seguir ── */
  .note{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    text-align:center; color:rgba(255,255,255,.4); padding:30px 20px 12px; }
  .cartaz{ padding:14px 16px; }
  .cartaz img{ width:100%; border-radius:10px; box-shadow:0 18px 40px -18px rgba(0,0,0,.55); }

  footer{ padding:56px 26px 88px; text-align:center; }
  footer .closing{ font-family:var(--disp); font-weight:700; font-size:1.5rem; line-height:1.15; color:var(--amarelo); }
</style>
</head>
<body>
  <div class="wrap">

    <header class="capa">
      <img class="hashtag-svg" src="../assets/Dancadestino/SVG/Lettering%20hashtag%20dAN%C3%87ADESTINO.svg" alt="#ProjetoDançaDestino" />
      <img class="wordmark-svg" src="../assets/Dancadestino/SVG/Lettering%20dAN%C3%87ADESTINO.svg" alt="DançaDestino" />
      <div class="capa-art">
        <div class="ybox" aria-hidden="true"></div>
        <img class="collage" src="../assets/Dancadestino/Imagem%20principal%20Capa_0.webp" alt="Estátua dançante entre flores" />
        <img class="candle" src="../assets/Dancadestino/Imagem%20secundaria%20Capa_0.webp" alt="Vela acesa" />
        <div class="seal"><img src="../assets/Dancadestino/Lettering%20Redondo.webp" alt="Você dança, onde estiver" /></div>
      </div>
      <p class="tag">Um ritual para nosso tempo.</p>
      <p class="when">Toda sexta, 20h.</p>
      <div class="cue" aria-hidden="true">⌄</div>
    </header>

    <main>
      <p class="note">— cartazes (placeholder) · próximos a virar nativos —</p>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_1.webp" alt="O que é DançaDestino" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_2.webp" alt="Micro-reocupação" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_3.jpg" alt="Um agora e um lugar para nosso destino" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_4.webp" alt="Dança e música" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_5.webp" alt="Restaurar a magia do comum" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_6.webp" alt="A economia política do íntimo" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_7.webp" alt="Dançar o presente com a presença que nos falta" loading="lazy" /></section>
    </main>

    <footer>
      <p class="closing">Dançar o presente<br>com a presença<br>que nos falta.</p>
    </footer>

  </div>
  <script>if(window!==window.top)document.documentElement.classList.add('embedded');</script>
  <style>html.embedded,html.embedded body{ overscroll-behavior-y:contain; }</style>
</body>
</html>
