<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DançaDestino — um ritual para nosso tempo</title>
<meta name="description" content="DançaDestino — um ritual para nosso tempo. Toda sexta, 20h." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --roxo:#6C28D6; --roxo-fundo:#5A1FB8; --roxo-escuro:#3D1185;
    --amarelo:#F5D933; --branco:#FDFBFF;
    --disp:"Space Grotesk",sans-serif; --mono:"Space Mono",ui-monospace,monospace;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:var(--roxo-fundo); color:var(--branco); font-family:var(--mono);
    -webkit-font-smoothing:antialiased; }
  html{ scroll-snap-type:y mandatory; }    /* cada tela roda pra próxima (uma de cada vez) */
  img{ display:block; max-width:100%; }
  .wrap{ max-width:540px; margin:0 auto; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.55; } 50%{ transform:translateY(7px); opacity:1; } }

  /* ── CAPA (composição fiel ao Capa_0: quadro cheio, elementos em sinergia) ── */
  .capa{ position:relative; height:100vh; height:100svh; min-height:560px; overflow:hidden; scroll-snap-align:start;
    background:radial-gradient(130% 78% at 48% 12%, var(--roxo) 0%, var(--roxo-fundo) 60%, var(--roxo-escuro) 100%); }
  /* wordmark vertical = espinha na borda direita (lê de baixo p/ cima) */
  .cv-wm{ position:absolute; right:1vw; top:50%; transform:translateY(-50%);
    height:92svh; width:10.6svh; display:flex; align-items:center; justify-content:center; z-index:4; }
  .cv-wm img{ width:92svh; max-width:none; transform:rotate(-90deg); }
  /* hashtag vertical, fina, paralela à esquerda do wordmark (não encosta) */
  .cv-ht{ position:absolute; right:14svh; top:6%; height:30svh; width:2.2svh;
    display:flex; align-items:center; justify-content:center; z-index:4; }
  .cv-ht img{ width:30svh; max-width:none; transform:rotate(-90deg); }
  /* bloco amarelo atrás da colagem */
  .cv-yb{ position:absolute; left:1%; top:26%; width:63%; height:43%;
    background:var(--amarelo); transform:rotate(-2deg); z-index:1; }
  /* colagem dominante, centro-esquerda (maior, ancorada embaixo p/ crescer na diagonal) */
  .cv-col{ position:absolute; left:-7%; bottom:22%; width:91%; z-index:2;
    filter:drop-shadow(0 18px 26px rgba(0,0,0,.3)); }
  /* vela: rente ao fim da tela (sem vão — emenda com a próxima tela) */
  .cv-candle{ position:absolute; bottom:0; left:47%; width:26%; z-index:3;
    filter:drop-shadow(0 10px 14px rgba(0,0,0,.32)); }
  /* selo girando — maior, encostando na mão da estátua */
  .cv-seal{ position:absolute; left:5%; top:7%; width:31vw; max-width:132px; z-index:5; }
  .cv-seal img{ width:100%; animation:spin 22s linear infinite; }
  /* tagline base-esquerda */
  .cv-tag{ position:absolute; left:5%; bottom:5%; z-index:5; text-align:left; }
  .cv-tag .r1{ font-family:var(--disp); font-weight:700; font-size:1.32rem; line-height:1.05;
    color:var(--amarelo); text-transform:uppercase; }
  .cv-tag .r2{ font-family:var(--disp); font-weight:500; font-size:1.02rem; color:var(--branco); margin-top:6px; }

  /* ── CARTAZES (placeholder) — viram nativos a seguir ── */
  .note{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    text-align:center; color:rgba(255,255,255,.4); padding:30px 20px 12px; }
  .cartaz{ min-height:100svh; display:flex; align-items:center; justify-content:center;
    padding:24px 16px; scroll-snap-align:start; }
  .cartaz img{ width:100%; border-radius:10px; box-shadow:0 18px 40px -18px rgba(0,0,0,.55); }

  footer{ min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:56px 26px; text-align:center; scroll-snap-align:start; }
  footer .closing{ font-family:var(--disp); font-weight:700; font-size:1.5rem; line-height:1.15; color:var(--amarelo); }
</style>
</head>
<body>
  <div class="wrap">

    <header class="capa">
      <div class="cv-yb" aria-hidden="true"></div>
      <img class="cv-col" src="../assets/Dancadestino/Imagem%20principal%20Capa_0.webp" alt="Estátua dançante entre flores" />
      <img class="cv-candle" src="../assets/Dancadestino/Imagem%20secundaria%20Capa_0.webp" alt="Vela acesa" />
      <div class="cv-wm"><img src="../assets/Dancadestino/SVG/Lettering%20dAN%C3%87ADESTINO.svg" alt="DançaDestino" /></div>
      <div class="cv-ht"><img src="../assets/Dancadestino/SVG/Lettering%20hashtag%20dAN%C3%87ADESTINO.svg" alt="#ProjetoDançaDestino" /></div>
      <div class="cv-seal"><img src="../assets/Dancadestino/Lettering%20Redondo.webp" alt="Você dança, onde estiver" /></div>
      <div class="cv-tag">
        <p class="r1">Um ritual<br>para nosso tempo.</p>
        <p class="r2">Toda sexta, 20h.</p>
      </div>
    </header>

    <main>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_1.webp" alt="O que é DançaDestino" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_2.webp" alt="Micro-reocupação" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_3.jpg" alt="Um agora e um lugar para nosso destino" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_4.webp" alt="Dança e música" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_5.webp" alt="Restaurar a magia do comum" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_6.webp" alt="A economia política do íntimo" loading="lazy" /></section>
      <section class="cartaz"><img src="../assets/Dancadestino/Cartaz_7.webp" alt="Dançar o presente com a presença que nos falta" loading="lazy" /></section>
    </main>

    <footer>
      <p class="closing">Dançar o presente<br>com a presença<br>que nos falta.</p>
    </footer>

  </div>
  <script>if(window!==window.top)document.documentElement.classList.add('embedded');</script>
  <style>html.embedded,html.embedded body{ overscroll-behavior-y:contain; }</style>
</body>
</html>
